<style>
    .offline-dialog { width: 208px; height: 266px;}
    .offline-body { width: 100%; height: 90%; display: block; }
    .offline-description { width: 100%; display: block; color: #d4d4d4; text-align: center; --text-wrap: true; --text-auto-resize: true; margin-top: 2px; }
    .skills-list { width: 100%; height: 75%; display: block; margin-top: 39px; }
    .skill-row { height: 25px;width: 100%; display: flex; align-items: stretch; margin-top: 4px; }
    .skill-info { flex: 1; display: flex; flex-direction: column; }
    .skill-header { height: 14px; display: flex; align-items: center; margin-bottom: 2px; }
    .skill-header-main { flex: 1; display: flex; align-items: center; }
    .skill-name { flex: 1; color: #d2d2d2;  }
    .skill-value { width: 46px; color: #c0c0c0;  text-align: right; margin-right: 10px; }
    .skill-body { width: 100%; height: 18px; display: flex; align-items: center; justify-content: flex-start; }
    .skill-icon { width: 9px; height: 9px; margin-right: 5px; flex-shrink: 0; }
    .skill-bar-wrap { flex: 1; display: flex; align-items: center; margin-right: 6px; }
    .skill-bar { width: 100%; height: 5px; background-color: #18be20; --image-source: /images/ui/progressbar; --image-border: 2; --text-offset: 0 0; }
    .train-btn { width: 25px; margin-left: 4px; height: 100%; margin-top: 5px }
    .offline-footer { width: 100%; display: flex; justify-content: flex-end; align-items: center;  }
    .cancel-btn { width: 25px; height: 0px;  }
    .offline-divider { width: 100%; height: 2px; }
</style>

<html>
<window id="offlineTrainingDialog" placement="center" class="offline-dialog" title="Offline Training" onescape="self:hideOfflineTrainingDialog()">
  <div class="offline-body" >
    <label class="offline-description">
      While logged out, you can train one of these skills using offline training. Shielding is always trained alongside.
    </label>

    <div class="skills-list">
      <div class="skill-row">
        <div class="skill-info">
          <div class="skill-header">
            <div class="skill-header-main">
              <label class="skill-name">Magic</label>
              <label id="magicValue" class="skill-value"></label>
            </div>
          </div>
          <div class="skill-body">
            <img class="skill-icon" src="/images/icons/icon_magic" />
            <div class="skill-bar-wrap">
              <progressbar id="magicBar" class="skill-bar"></progressbar>
            </div>
          </div>
        </div>
        <button class="train-btn" onclick="self:sendStartOfflineTraining(self.OFFLINE_TRAINING_MAGIC_SKILL)" text="Train"></button>
      </div>

      <div class="skill-row">
        <div class="skill-info">
          <div class="skill-header">
            <div class="skill-header-main">
              <label class="skill-name">Fist</label>
              <label id="fistValue" class="skill-value"></label>
            </div>
          </div>
          <div class="skill-body">
            <img class="skill-icon" src="/images/icons/icon_fist" />
            <div class="skill-bar-wrap">
              <progressbar id="fistBar" class="skill-bar"></progressbar>
            </div>
          </div>
        </div>
        <button class="train-btn" onclick="self:sendStartOfflineTraining(Skill.Fist)" text="Train"></button>
      </div>

      <div class="skill-row">
        <div class="skill-info">
          <div class="skill-header">
            <div class="skill-header-main">
              <label class="skill-name">Club</label>
              <label id="clubValue" class="skill-value"></label>
            </div>
          </div>
          <div class="skill-body">
            <img class="skill-icon" src="/images/icons/icon_club" />
            <div class="skill-bar-wrap">
              <progressbar id="clubBar" class="skill-bar"></progressbar>
            </div>
          </div>
        </div>
        <button class="train-btn" onclick="self:sendStartOfflineTraining(Skill.Club)" text="Train"></button>
      </div>

      <div class="skill-row">
        <div class="skill-info">
          <div class="skill-header">
            <div class="skill-header-main">
              <label class="skill-name">Sword</label>
              <label id="swordValue" class="skill-value"></label>
            </div>
          </div>
          <div class="skill-body">
            <img class="skill-icon" src="/images/icons/icon_sword" />
            <div class="skill-bar-wrap">
              <progressbar id="swordBar" class="skill-bar"></progressbar>
            </div>
          </div>
        </div>
        <button class="train-btn" onclick="self:sendStartOfflineTraining(Skill.Sword)" text="Train"></button>
      </div>

      <div class="skill-row">
        <div class="skill-info">
          <div class="skill-header">
            <div class="skill-header-main">
              <label class="skill-name">Axe</label>
              <label id="axeValue" class="skill-value"></label>
            </div>
          </div>
          <div class="skill-body">
            <img class="skill-icon" src="/images/icons/icon_axe" />
            <div class="skill-bar-wrap">
              <progressbar id="axeBar" class="skill-bar"></progressbar>
            </div>
          </div>
        </div>
        <button class="train-btn" onclick="self:sendStartOfflineTraining(Skill.Axe)" text="Train"></button>
      </div>

      <div class="skill-row">
        <div class="skill-info">
          <div class="skill-header">
            <div class="skill-header-main">
              <label class="skill-name">Distance</label>
              <label id="distanceValue" class="skill-value"></label>
            </div>
          </div>
          <div class="skill-body">
            <img class="skill-icon" src="/images/icons/icon_distance" />
            <div class="skill-bar-wrap">
              <progressbar id="distanceBar" class="skill-bar"></progressbar>
            </div>
          </div>
        </div>
        <button class="train-btn" onclick="self:sendStartOfflineTraining(Skill.Distance)" text="Train"></button>
      </div>
    </div>

    <hr class="offline-divider" />

    <div class="offline-footer">
      <button class="cancel-btn" onclick="self:hideOfflineTrainingDialog()" text="Cancel"></button>
    </div>
  </div>
</window>
</html>
